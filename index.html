<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easifay Tools</title>
    <!-- استدعاء مكتبة التصميم المستقرة -->
    <script src="https://tailwindcss.com"></script>
    <!-- مكتبة الـ QR كود الشغالة محلياً -->
    <script src="https://cloudflare.com"></script>
    <style>
        /* الألوان الدقيقة المقتبسة من صورتك الأصلية */
        body { background-color: #131e31 !important; }
        .tool-card { background-color: #1c293e !important; border-color: #2b3a52 !important; }
    </style>
</head>
<body class="text-slate-300 font-sans antialiased min-h-screen">

    <!-- MAIN HOME PAGE SCREEN -->
    <div id="homeScreen" class="block pb-12">
        <header class="border-b border-slate-800 bg-[#1c293e]/80 backdrop-blur sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">Easifay Tools</h1>
            <span class="text-xs bg-blue-500/10 text-blue-400 border border-blue-500/20 px-2 py-1 rounded-full font-mono">v2.0</span>
        </header>

        <main class="max-w-6xl mx-auto px-4 mt-8 space-y-10">
            <!-- 1️⃣ IMAGE TOOLS -->
            <section class="space-y-4">
                <h2 class="text-xs font-semibold text-slate-400 tracking-wider uppercase flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span> IMAGE TOOLS
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                    <div onclick="showTool('upscaler', 'AI Image Upscaler')" class="tool-card cursor-pointer flex items-center gap-3 p-3 rounded-xl border active:scale-95 transition duration-150 shadow-md">
                        <div class="w-8 h-8 rounded-full bg-blue-500/10 flex items-center justify-center text-blue-400 text-sm shrink-0">✨</div>
                        <div><h3 class="font-medium text-xs text-slate-200">AI Image Upscaler</h3><p class="text-[10px] text-slate-500">Enhance quality</p></div>
                    </div>
                    <div onclick="showTool('bg-remover', 'Background Remover')" class="tool-card cursor-pointer flex items-center gap-3 p-3 rounded-xl border active:scale-95 transition duration-150 shadow-md">
                        <div class="w-8 h-8 rounded-full bg-indigo-500/10 flex items-center justify-center text-indigo-400 text-sm shrink-0">✂️</div>
                        <div><h3 class="font-medium text-xs text-slate-200">Background Remover</h3><p class="text-[10px] text-slate-500">Remove backgrounds</p></div>
                    </div>
                </div>
            </section>

            <!-- 2️⃣ VIDEO & AUDIO TOOLS -->
            <section class="space-y-4">
                <h2 class="text-xs font-semibold text-slate-400 tracking-wider uppercase flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> VIDEO & AUDIO TOOLS
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                    <div onclick="showTool('vocal-remover', 'Vocal Remover')" class="tool-card cursor-pointer flex items-center gap-3 p-3 rounded-xl border active:scale-95 transition duration-150 shadow-md">
                        <div class="w-8 h-8 rounded-full bg-lime-500/10 flex items-center justify-center text-lime-400 text-sm shrink-0">🎵</div>
                        <div><h3 class="font-medium text-xs text-slate-200">Vocal Remover</h3><p class="text-[10px] text-slate-500">Split music tracks</p></div>
                    </div>
                </div>
            </section>
            <!-- 3️⃣ AI, DOCUMENTS & DIGITAL TOOLS -->
            <section class="space-y-4">
                <h2 class="text-xs font-semibold text-slate-400 tracking-wider uppercase flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-rose-500"></span> AI, DOCUMENTS & DIGITAL TOOLS
                </h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                    <div onclick="showTool('qr-generator', 'QR Code Generator')" class="tool-card cursor-pointer flex items-center gap-3 p-3 rounded-xl border active:scale-95 transition duration-150 shadow-md">
                        <div class="w-8 h-8 rounded-full bg-rose-500/10 flex items-center justify-center text-rose-400 text-sm shrink-0">🔗</div>
                        <div><h3 class="font-medium text-xs text-slate-200">QR Code Generator</h3><p class="text-[10px] text-slate-500">Create QR codes</p></div>
                    </div>
                    <div onclick="showTool('password-maker', 'Password Maker')" class="tool-card cursor-pointer flex items-center gap-3 p-3 rounded-xl border active:scale-95 transition duration-150 shadow-md">
                        <div class="w-8 h-8 rounded-full bg-violet-500/10 flex items-center justify-center text-violet-400 text-sm shrink-0">🔑</div>
                        <div><h3 class="font-medium text-xs text-slate-200">Password Maker</h3><p class="text-[10px] text-slate-500">Strong passwords</p></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- DYNAMIC INFRASTRUCTURE FOR LOADING TOOLS IN THE SAME PAGE -->
    <div id="toolScreen" class="hidden min-h-screen flex flex-col bg-[#131e31]">
        <header class="border-b border-slate-800 bg-[#1c293e] px-4 py-4 flex items-center gap-4 shadow-md">
            <button onclick="backToHome()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-xs font-medium transition">← Back</button>
            <h2 id="currentToolTitle" class="text-sm font-bold text-blue-400">Tool Name</h2>
        </header>
        <div class="flex-1 max-w-md w-full mx-auto px-4 py-6" id="toolViewBody">
            <!-- Tool Workspace -->
        </div>
    </div>

    <script>
        const home = document.getElementById('homeScreen');
        const toolScreen = document.getElementById('toolScreen');
        const toolTitle = document.getElementById('currentToolTitle');
        const toolBody = document.getElementById('toolViewBody');

        function showTool(id, name) {
            home.classList.replace('block', 'hidden');
            toolScreen.classList.replace('hidden', 'flex');
            toolTitle.innerText = name;

            if (id === 'qr-generator') {
                toolBody.innerHTML = `
                    <div class="bg-[#1c293e] border border-slate-800 p-5 rounded-2xl space-y-4 shadow-xl">
                        <label class="block text-xs font-medium text-slate-400">Target Content</label>
                        <input type="text" id="qrText" placeholder="Paste URL or text here..." class="w-full bg-[#131e31] border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-slate-200 focus:outline-none focus:border-blue-500 transition">
                        <button onclick="fireQR()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium text-xs py-2.5 rounded-xl transition shadow-md shadow-blue-600/10">Generate Code</button>
                        <div id="outputContainer" class="flex justify-center p-3 bg-white rounded-xl hidden max-w-[160px] mx-auto mt-4"></div>
                    </div>`;
            } else {
                toolBody.innerHTML = `
                    <div class="text-center py-12 bg-[#1c293e] border border-slate-800 rounded-2xl shadow-xl">
                        <p class="text-xs text-slate-400">Core code for this tool will be injected next.</p>
                    </div>`;
            }
        }

        function backToHome() {
            toolScreen.classList.replace('flex', 'hidden');
            home.classList.replace('hidden', 'block');
            toolBody.innerHTML = "";
        }

        function fireQR() {
            const val = document.getElementById('qrText').value;
            const container = document.getElementById('outputContainer');
            if(!val) return alert("Please type a valid link first!");
            
            container.innerHTML = "";
            container.classList.remove('hidden');
            
            new QRCode(container, {
                text: val,
                width: 140,
                height: 140,
                colorDark : "#131e31",
                colorLight : "#ffffff"
            });
        }
    </script>
</body>
</html>
