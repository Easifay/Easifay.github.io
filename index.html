<!DOCTYPE html>
<html lang="en" id="html-tag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easifay Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #070f1e 0%, #0d1b3a 100%);
            --sidebar-bg: rgba(15, 26, 48, 0.95);
            --border-color: rgba(30, 45, 80, 0.6);
            --text-color: #ffffff;
            --text-muted: #a0aec0;
            --primary-accent: #00f2fe;
            --tool-card-bg: rgba(255, 255, 255, 0.07);
            --tool-card-hover: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.02) 100%);
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; display: flex; min-height: 100vh;
            direction: ltr; transition: all 0.3s ease;
            overflow-x: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 260px; background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color); display: flex;
            flex-direction: column; position: fixed; top: 0; bottom: 0; left: 0; z-index: 100;
            backdrop-filter: blur(10px);
        }

        body.rtl-mode { direction: rtl; }
        body.rtl-mode .sidebar { left: auto; right: 0; border-right: none; border-left: 1px solid var(--border-color); }
        body.rtl-mode .main-content { margin-left: 0; margin-right: 260px; }

        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border-color); text-align: center; }
        .sidebar-header h2 { margin: 0; font-size: 22px; background: linear-gradient(to right, #00f2fe, #4facfe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        
        .sidebar-menu { list-style: none; padding: 20px 0; margin: 0; display: flex; flex-direction: column; gap: 5px; flex-grow: 1; overflow-y: auto; }
        .sidebar-menu li a { display: flex; align-items: center; gap: 15px; padding: 12px 25px; color: var(--text-muted); text-decoration: none; font-size: 15px; cursor: pointer; transition: all 0.2s; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { color: var(--text-color); background: rgba(23, 38, 70, 0.7); }
        
        body.rtl-mode .sidebar-menu li a.active { border-right: 4px solid var(--primary-accent); border-left: none; padding-right: 21px; }
        body:not(.rtl-mode) .sidebar-menu li a.active { border-left: 4px solid var(--primary-accent); border-right: none; padding-left: 21px; }

        /* --- MAIN CONTENT --- */
        .main-content { flex-grow: 1; margin-left: 260px; padding: 40px; box-sizing: border-box; transition: margin 0.3s ease; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        
        .lang-select-wrapper { position: relative; }
        .lang-select { background: rgba(17, 28, 53, 0.8); border: 1px solid var(--border-color); color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; outline: none; appearance: none; -webkit-appearance: none; padding-right: 35px; }
        body.rtl-mode .lang-select { padding-right: 20px; padding-left: 35px; }
        .lang-select-wrapper::after { content: "\f0ac"; font-family: "Font Awesome 5 Free"; font-weight: 900; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-accent); pointer-events: none; }
        body.rtl-mode .lang-select-wrapper::after { right: auto; left: 15px; }

        .search-container { margin-bottom: 35px; position: relative; max-width: 500px; }
        .search-container input { width: 100%; background-color: rgba(17, 28, 53, 0.6); border: 1px solid var(--border-color); padding: 14px 20px 14px 45px; border-radius: 12px; color: #fff; font-size: 15px; outline: none; box-sizing: border-box; backdrop-filter: blur(5px); }
        .search-container input:focus { border-color: var(--primary-accent); box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        .search-container i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        
        body.rtl-mode .search-container input { padding: 14px 45px 14px 20px; }
        body.rtl-mode .search-container i { left: auto; right: 18px; }

        .section-title { font-size: 14px; color: var(--text-muted); margin: 35px 0 20px 0; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold; }

        /* --- MODERN ROUNDED GRID (Canva Style) --- */
        .tools-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 25px; 
            margin-bottom: 20px;
        }
        
        .tool-card { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            text-decoration: none; 
            cursor: pointer; background: none; border: none; outline: none; padding: 10px;
        }
        
        .icon-circle { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: var(--tool-card-bg); border: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center; 
            font-size: 24px; color: #ffffff; box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .tool-card:hover .icon-circle { 
            transform: translateY(-6px);
            background: var(--tool-card-hover); border-color: var(--primary-accent);
            box-shadow: 0 12px 20px rgba(0, 242, 254, 0.25);
        }

        .tool-card h3 { 
            margin: 12px 0 0 0; font-size: 13px; font-weight: 500; 
            color: #e2e8f0; line-height: 1.4; max-width: 120px; transition: color 0.2s;
        }
        .tool-card:hover h3 { color: var(--primary-accent); }

        /* --- INTEGRATED IFRAME OVERLAY --- */
        .app-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #070f1e; z-index: 2000; display: none; flex-direction: column;
        }
        .app-overlay-header {
            background: #0f1a30; padding: 15px 25px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color);
        }
        .app-overlay-header h2 { margin: 0; font-size: 18px; color: #fff; }
        .close-app-btn {
            background: #ff5e62; border: none; color: white; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px;
        }
        .app-frame { width: 100%; flex-grow: 1; border: none; background: #fff; }

        /* --- RESPONSIVE MOBILE VIEW (الأيقونات بجانب بعضها على الهاتف) --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            body.rtl-mode .sidebar { border-left: none; }
            .main-content { margin-left: 0 !important; margin-right: 0 !important; padding: 20px; }
            .top-bar { flex-direction: column; align-items: flex-start; gap: 15px; }
            
            /* تعديل جوهري: جعل الجريد يعرض الأيقونات متجاورة بجانب بعضها بمساحات أصغر على الجوال */
            .tools-grid { 
                grid-template-columns: repeat(3, 1fr); 
                gap: 12px; 
            }
            .icon-circle { width: 55px; height: 55px; font-size: 18px; }
            .tool-card h3 { font-size: 11px; max-width: 85px; margin-top: 8px; }
        }
        @media (max-width: 480px) {
            .tools-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2 id="logo-text">Easifay Tools</h2>
        </div>
        <ul class="sidebar-menu">
            <li><a class="active" onclick="filterCategory('all')" id="menu-all"><i class="fa-solid fa-layer-group"></i> <span>All Hubs</span></a></li>
            <li><a onclick="filterCategory('media')" id="menu-media"><i class="fa-solid fa-photo-film"></i> <span>Images & Video</span></a></li>
            <li><a onclick="filterCategory('text')" id="menu-text"><i class="fa-solid fa-align-left"></i> <span>Text & Content</span></a></li>
            <li><a onclick="filterCategory('creators')" id="menu-creators"><i class="fa-solid fa-sliders"></i> <span>Creators & Dev</span></a></li>
            <li><a onclick="filterCategory('math')" id="menu-math"><i class="fa-solid fa-calculator"></i> <span>Utilities & Math</span></a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div>
                <h1 id="main-title" style="margin:0; font-size: 28px;">Easifay Tools</h1>
                <p id="main-desc" style="margin: 5px 0 0 0; color: var(--text-muted); font-size: 14px;">Next-generation instant web tools running locally.</p>
            </div>
            <div class="lang-select-wrapper">
                <select class="lang-select" onchange="changeLanguage(this.value)" id="langSelect">
                    <option value="en">English</option>
                    <option value="ar">العربية</option>
                    <option value="fr">Français</option>
                    <option value="es">Español</option>
                </select>
            </div>
        </div>

        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="toolSearch" placeholder="Search for tools instantly..." oninput="renderTools()">
        </div>

        <div id="dynamicGrid"></div>
    </div>

    <div class="app-overlay" id="appOverlay">
        <div class="app-overlay-header">
            <h2 id="overlayTitle">Tool</h2>
            <button class="close-app-btn" onclick="closeTool()" id="closeBtn">Back</button>
        </div>
        <iframe class="app-frame" id="appIframe" src=""></iframe>
    </div>

    <script>
        let currentLang = 'en';
        let currentCategory = 'all';

        // قاعدة البيانات الكاملة لـ 25 أداة محلية 100% ومحدثة بالكامل طبقاً للتغييرات
        const toolsData = [
            // --- IMAGES & VIDEO HUB (7 أدوات) ---
            { id: "photo-editor", icon: "fa-solid fa-wand-magic-sparkles", gradient: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)", path: "tools/photo-editor/index.html", category: "media", title: { en: "Photo FX", ar: "تعديل الصور", fr: "Effets Photo", es: "Efectos Foto" }},
            { id: "photo-overlay", icon: "fa-solid fa-layer-group", gradient: "linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%)", path: "tools/photo-overlay/index.html", category: "media", title: { en: "Photo Overlay", ar: "دمج وتراكب الصور", fr: "Superposition", es: "Superposición" }},
            { id: "image-compressor", icon: "fa-solid fa-compress", gradient: "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)", path: "tools/image-compressor/index.html", category: "media", title: { en: "Image Compress", ar: "ضغط وتقطيع الصور", fr: "Compresser Image", es: "Comprimir Imagen" }},
            { id: "pixel-canvas", icon: "fa-solid fa-palette", gradient: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)", path: "tools/pixel-canvas/index.html", category: "media", title: { en: "Pixel Studio", ar: "تحسين ورسم الصور", fr: "Studio Pixel", es: "Estudio Pixel" }},
            { id: "gradient-generator", icon: "fa-solid fa-fill-drip", gradient: "linear-gradient(135deg, #ff9966 0%, #ff5e62 100%)", path: "tools/gradient-generator/index.html", category: "media", title: { en: "CSS Gradients", ar: "تأثيرات الصور الفورية", fr: "Gradients CSS", es: "Degradados CSS" }},
            { id: "speech-to-text", icon: "fa-solid fa-microphone-lines", gradient: "linear-gradient(135deg, #00c6ff 0%, #0072ff 100%)", path: "tools/speech-to-text/index.html", category: "media", title: { en: "Speech to Text", ar: "الكلام إلى نص مكتوب", fr: "Reconnaissance Vocale", es: "Voz a Texto" }},
            { id: "text-to-speech", icon: "fa-solid fa-volume-high", gradient: "linear-gradient(135deg, #f12711 0%, #f5af19 100%)", path: "tools/text-to-speech/index.html", category: "media", title: { en: "Text to Speech", ar: "تحويل النص إلى كلام", fr: "Synthèse Vocale", es: "Texto a Voz" }},

            // --- TEXT & CONTENT HUB (5 أدوات) ---
            { id: "word-counter", icon: "fa-solid fa-file-lines", gradient: "linear-gradient(135deg, #00c6ff 0%, #0072ff 100%)", path: "tools/word-counter/index.html", category: "text", title: { en: "Word Counter", ar: "عداد الكلمات", fr: "Compteur de Mots", es: "Contador de Palabras" }},
            { id: "text-diff", icon: "fa-solid fa-not-equal", gradient: "linear-gradient(135deg, #f12711 0%, #f5af19 100%)", path: "tools/text-diff/index.html", category: "text", title: { en: "Text Diff", ar: "مقارنة النصوص وفرزها", fr: "Différence Texte", es: "Comparador Texto" }},
            { id: "markdown-editor", icon: "fa-solid fa-file-code", gradient: "linear-gradient(135deg, #b91c1c 0%, #f97316 100%)", path: "tools/markdown-editor/index.html", category: "text", title: { en: "Markdown Editor", ar: "تحرير وتنسيق المحتوى", fr: "Éditeur Markdown", es: "Editor Markdown" }},
            { id: "instant-cards", icon: "fa-solid fa-id-card", gradient: "linear-gradient(135deg, #ff9966 0%, #3a7bd5 100%)", path: "tools/instant-cards/index.html", category: "text", title: { en: "Card Generator", ar: "صانع بطاقات المحتوى", fr: "Générateur de Cartes", es: "Generador de Tarjetas" }},
            { id: "text-cleaner", icon: "fa-solid fa-broom", gradient: "linear-gradient(135deg, #11998e 0%, #0d1b3a 100%)", path: "tools/text-cleaner/index.html", category: "text", title: { en: "Text Cleaner", ar: "منظف النصوص والفراغات", fr: "Nettoyeur de Texte", es: "Limpiador de Texto" }},

            // --- CREATORS & DEV HUB (7 أدوات) ---
            { id: "code-beautifier", icon: "fa-solid fa-code", gradient: "linear-gradient(135deg, #7f00ff 0%, #e100ff 100%)", path: "tools/code-beautifier/index.html", category: "creators", title: { en: "Code Beautifier", ar: "منسق الأكواد البرمجية", fr: "Clarificateur de Code", es: "Embellecedor Código" }},
            { id: "regex-tester", icon: "fa-solid fa-vial", gradient: "linear-gradient(135deg, #3a7bd5 0%, #3a6073 100%)", path: "tools/regex-tester/index.html", category: "creators", title: { en: "Regex Tester", ar: "مختبر التعبيرات النمطية", fr: "Testeur Regex", es: "Probador Regex" }},
            { id: "password-generator", icon: "fa-solid fa-shield-halved", gradient: "linear-gradient(135deg, #ff5e62 0%, #ff9966 100%)", path: "tools/password-generator/index.html", category: "creators", title: { en: "Secure Password", ar: "مولد الرموز والحماية", fr: "Mot de Passe", es: "Generador Contraseña" }},
            { id: "meta-tags", icon: "fa-solid fa-tags", gradient: "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)", path: "tools/meta-tags/index.html", category: "creators", title: { en: "SEO Meta Maker", ar: "صناع المحتوى التقني", fr: "Balises SEO", es: "Creador Meta Tags" }},
            { id: "color-palette", icon: "fa-solid fa-swatchbook", gradient: "linear-gradient(135deg, #ff9966 0%, #ff5e62 100%)", path: "tools/color-palette/index.html", category: "creators", title: { en: "Palette Generator", ar: "تنسيق الألوان الرقمية", fr: "Palette de Couleurs", es: "Paleta de Colores" }},
            { id: "base64-encoder", icon: "fa-solid fa-arrow-up-right-dots", gradient: "linear-gradient(135deg, #00c6ff 0%, #7f00ff 100%)", path: "tools/base64-encoder/index.html", category: "creators", title: { en: "Base64 Encoder", ar: "مشفر محول الأكواد", fr: "Encodeur Base64", es: "Codificador Base64" }},
            { id: "digital-whiteboard", icon: "fa-solid fa-chalkboard", gradient: "linear-gradient(135deg, #4facfe 0%, #f5576c 100%)", path: "tools/digital-whiteboard/index.html", category: "creators", title: { en: "Sketch Board", ar: "لوحة الرسم السريع", fr: "Tableau Blanc", es: "Pizarra Digital" }},

            // --- UTILITIES & CALCULATORS (6 أدوات) ---
            { id: "scientific-calc", icon: "fa-solid fa-square-root-variable", gradient: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)", path: "tools/scientific-calc/index.html", category: "math", title: { en: "Smart Calc", ar: "أدوات الحسابات المتقدمة", fr: "Calculatrice", es: "Calculadora" }},
            { id: "unit-converter", icon: "fa-solid fa-scale-balanced", gradient: "linear-gradient(135deg, #f093fb 0%, #f5576c 100%)", path: "tools/unit-converter/index.html", category: "math", title: { en: "Unit Converter", ar: "محول القياسات والوحدات", fr: "Convertisseur", es: "Convertidor Unidades" }},
            { id: "qr-code-hub", icon: "fa-solid fa-qrcode", gradient: "linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%)", path: "tools/qr-code-hub/index.html", category: "math", title: { en: "QR Generator", ar: "مولد الروابط وأكواد QR", fr: "Code QR", es: "Generador QR" }},
            { id: "pomodoro-timer", icon: "fa-solid fa-stopwatch", gradient: "linear-gradient(135deg, #ff5e62 0%, #b91c1c 100%)", path: "tools/pomodoro-timer/index.html", category: "math", title: { en: "Focus Pomodoro", ar: "مساعد تنظيم الوقت", fr: "Minuteur Pomodoro", es: "Temporizador" }},
            { id: "percentage-calc", icon: "fa-solid fa-percent", gradient: "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)", path: "tools/percentage-calc/index.html", category: "math", title: { en: "Percentage Calc", ar: "حاسبة النسبة المئوية", fr: "Calcul Pourcentage", es: "Cálculo Porcentaje" }},
            { id: "date-calculator", icon: "fa-solid fa-calendar-days", gradient: "linear-gradient(135deg, #00c6ff 0%, #3a6073 100%)", path: "tools/date-calculator/index.html", category: "math", title: { en: "Date Calculator", ar: "حاسبة الفروق الزمنية", fr: "Calcul Date", es: "Calculadora Fechas" }}
        ];

        const uiStrings = {
            en: { logo: "Easifay Tools", all: "All Hubs", media: "Images & Video", text: "Text & Content", creators: "Creators & Dev", math: "Utilities & Math", title: "Easifay Tools", desc: "Next-generation instant web tools running locally.", search: "Search for tools instantly...", close: "Back to Dashboard" },
            ar: { logo: "Easifay Tools", all: "جميع الأقسام", media: "أدوات الصور والفيديو", text: "أدوات النصوص والمحتوى", creators: "أدوات المطورين وصناع المحتوى", math: "أدوات الحسابات والحلول الرقمية", title: "Easifay Tools", desc: "منصة الأدوات الذكية المتقدمة التي تعمل مباشرة داخل متصفحك.", search: "ابحث عن أي أداة فوراً...", close: "الرجوع للوحة التحكم" },
            fr: { logo: "Easifay Tools", all: "Tous les Hubs", media: "Images & Vidéo", text: "Texte & Contenu", creators: "Créateurs & Dév", math: "Utilitaires & Math", title: "Easifay Tools", desc: "Outils web instantanés de nouvelle génération s'exécutant localement.", search: "Rechercher un outil...", close: "Retour au tableau de bord" },
            es: { logo: "Easifay Tools", all: "Todos los Hubs", media: "Imágenes y Video", text: "Texto y Contenido", creators: "Creadores y Dev", math: "Utilidades y Matemáticas", title: "Easifay Tools", desc: "Herramientas web instantáneas de próxima generación ejecutadas localmente.", search: "Buscar herramienta...", close: "Volver al panel" }
        };

        function openTool(path, title) {
            document.getElementById('overlayTitle').innerText = title;
            document.getElementById('appIframe').src = path;
            document.getElementById('appOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeTool() {
            document.getElementById('appOverlay').style.display = 'none';
            document.getElementById('appIframe').src = "";
            document.body.style.overflow = 'auto';
        }

        function changeLanguage(lang) {
            currentLang = lang;
            const htmlTag = document.getElementById('html-tag');
            
            if (currentLang === 'ar') {
                htmlTag.setAttribute('dir', 'rtl');
                document.body.classList.add('rtl-mode');
            } else {
                htmlTag.removeAttribute('dir');
                document.body.classList.remove('rtl-mode');
            }

            document.getElementById('logo-text').innerText = uiStrings[currentLang].logo;
            document.getElementById('menu-all').getElementsByTagName('span')[0].innerText = uiStrings[currentLang].all;
            document.getElementById('menu-media').getElementsByTagName('span')[0].innerText = uiStrings[currentLang].media;
            document.getElementById('menu-text').getElementsByTagName('span')[0].innerText = uiStrings[currentLang].text;
            document.getElementById('menu-creators').getElementsByTagName('span')[0].innerText = uiStrings[currentLang].creators;
            document.getElementById('menu-math').getElementsByTagName('span')[0].innerText = uiStrings[currentLang].math;
            
            document.getElementById('main-title').innerText = uiStrings[currentLang].title;
            document.getElementById('main-desc').innerText = uiStrings[currentLang].desc;
            document.getElementById('toolSearch').placeholder = uiStrings[currentLang].search;
            document.getElementById('closeBtn').innerText = uiStrings[currentLang].close;

            renderTools();
        }

        function filterCategory(category) {
            currentCategory = category;
            const links = document.querySelectorAll('.sidebar-menu li a');
            links.forEach(link => link.classList.remove('active'));
            document.getElementById(`menu-${category}`).classList.add('active');
            renderTools();
        }

        function renderTools() {
            const container = document.getElementById('dynamicGrid');
            const searchVal = document.getElementById('toolSearch').value.toLowerCase();
            container.innerHTML = "";

            const categoriesToRender = currentCategory === 'all' ? ['media', 'text', 'creators', 'math'] : [currentCategory];

            categoriesToRender.forEach(cat => {
                const filtered = toolsData.filter(t => t.category === cat && t.title[currentLang].toLowerCase().includes(searchVal));
                
                if (filtered.length > 0) {
                    const titleSection = document.createElement('div');
                    titleSection.className = 'section-title';
                    titleSection.innerText = uiStrings[currentLang][cat];
                    container.appendChild(titleSection);

                    const grid = document.createElement('div');
                    grid.className = 'tools-grid';

                    filtered.forEach(tool => {
                        const card = document.createElement('button');
                        card.className = 'tool-card';
                        card.onclick = () => openTool(tool.path, tool.title[currentLang]);
                        
                        card.innerHTML = `
                            <div class="icon-circle">
                                <i class="${tool.icon}" style="background: ${tool.gradient}; -webkit-background-clip: text; -webkit-text-fill-color: transparent;"></i>
                            </div>
                            <h3>${tool.title[currentLang]}</h3>
                        `;
                        grid.appendChild(card);
                    });
                    container.appendChild(grid);
                }
            });
        }

        renderTools();
    </script>
</body>
</html>
