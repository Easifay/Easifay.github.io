<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easifay Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0b1528;
            --bg-card: #111c35;
            --text-color: #ffffff;
            --text-muted: #8fa0dd;
            --accent-blue: #00d2ff;
            
            /* تدرجات ألوان الأيقونات المتطورة */
            --grad-photo: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            --grad-video: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            --grad-other: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --grad-dev: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: transform 0.2s ease, background 0.3s ease;
        }

        body, html {
            background-color: var(--bg-main);
            color: var(--text-color);
            height: 100%;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px; 
            margin: 0 auto;
            padding: 20px;
        }

        .lang-switcher {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .lang-btn.active {
            background: var(--accent-blue);
            color: #000;
            border-color: var(--accent-blue);
        }

        header { text-align: center; padding: 30px 10px; }
        header h1 { font-size: 36px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
        header h1 span { color: var(--accent-blue); }
        header p { color: var(--text-muted); font-size: 14px; }

        .ad-area {
            background: rgba(0, 210, 255, 0.05);
            border: 1px dashed rgba(0, 210, 255, 0.3);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-bottom: 30px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .section-box {
            background-color: var(--bg-card);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #1e2d50;
        }

        .section-title {
            font-size: 16px;
            color: var(--accent-blue);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* توزيع الشبكة على الشاشات الكبيرة (الكمبيوتر) */
        .tools-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }

        .tool-item {
            display: flex;
            flex-direction: column; 
            align-items: center;
            text-align: center;
            background: rgba(255, 255, 255, 0.02);
            padding: 25px 15px;
            border-radius: 16px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .tool-item:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 210, 255, 0.3);
            transform: translateY(-5px); 
        }

        .icon-circle {
            width: 60px;
            height: 60px;
            border-radius: 16px; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
            color: #ffffff;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .photo-route .icon-circle { background: var(--grad-photo); color: #2c3e50; }
        .video-route .icon-circle { background: var(--grad-video); color: #2c3e50; }
        .other-route .icon-circle { background: var(--grad-other); }
        .dev-route .icon-circle { background: var(--grad-dev); color: #2c3e50; }

        .tool-info h3 { font-size: 15px; font-weight: 600; margin-bottom: 8px; color: #ffffff; }
        .tool-info p { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

        #tool-view-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-main);
            z-index: 9999;
            flex-direction: column;
        }

        .tool-bar {
            background-color: var(--bg-card);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1e2d50;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--accent-blue);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        html[dir="ltr"] .back-btn i { transform: rotate(180deg); }

        iframe { width: 100%; height: 100%; border: none; background-color: transparent; }
        footer { text-align: center; font-size: 11px; color: var(--text-muted); padding: 40px 0; }

        /* ==================== كود التجاوب الخاص بالهواتف المحمولة ==================== */
        @media (max-width: 600px) {
            .container { padding: 12px; }
            header h1 { font-size: 28px; }
            .section-box { padding: 15px; border-radius: 14px; margin-bottom: 20px; }
            .section-title { font-size: 14px; margin-bottom: 15px; }
            
            /* تفعيل شبكة عرض ثنائية مدمجة للهواتف المحمولة */
            .tools-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px; 
            }

            .tool-item { padding: 15px 8px; border-radius: 12px; }
            .icon-circle { width: 45px; height: 45px; font-size: 18px; border-radius: 10px; margin-bottom: 10px; }
            .tool-info h3 { font-size: 12px; margin-bottom: 4px; }
            .tool-info p { font-size: 10px; line-height: 1.3; }
        }
    </style>
</head>

    let currentLang = 'en';

    function switchLanguage(lang) {
        currentLang = lang;
        const data = translations[lang];
        
        document.documentElement.dir = data.dir;
        document.documentElement.lang = lang;

        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        
        const buttons = document.querySelectorAll('.lang-btn');
        if (lang === 'en') buttons[0].classList.add('active');
        if (lang === 'ar') buttons[1].classList.add('active');
        if (lang === 'es') buttons[2].classList.add('active');
        if (lang === 'fr') buttons[3].classList.add('active');

        document.getElementById('site-desc').innerText = data.desc;
        document.getElementById('ad-text').innerHTML = `<i class="fa-solid fa-rectangle-ad"></i> ${data.ad}`;
        document.getElementById('back-text').innerText = data.back;
        document.getElementById('title-photo').innerHTML = `<i class="fa-solid fa-image"></i> ${data.photo}`;
        document.getElementById('title-video').innerHTML = `<i class="fa-solid fa-video"></i> ${data.video}`;
        document.getElementById('title-other').innerHTML = `<i class="fa-solid fa-code"></i> ${data.other}`;

        const keys = ['t1','t2','t3','t4','t14','t15','t16','t8','t12','t13','t6','t17','t18','t3_dev','t2_cal','t5','t11','t19','t20','t21','t22','t23','t24','t25'];
        keys.forEach(k => {
            document.getElementById(`${k}-h`).innerText = data[`${k}h`];
            document.getElementById(`${k}-p`).innerText = data[`${k}p`];
        });
    }

    function openTool(url, toolKey) {
        document.getElementById('main-homepage').style.display = 'none';
        const container = document.getElementById('tool-view-container');
        container.style.display = 'flex';
        
        document.getElementById('current-tool-title').innerText = translations[currentLang][toolKey + 'h'] || toolKey;
        document.getElementById('tool-frame').src = url;
        history.pushState({ inTool: true }, toolKey, "#" + toolKey);
    }

    function closeTool() {
        document.getElementById('tool-view-container').style.display = 'none';
        document.getElementById('main-homepage').style.display = 'block';
        document.getElementById('tool-frame').src = "";
    }

    window.onpopstate = function(event) {
        if (document.getElementById('tool-view-container').style.display === 'flex') {
            closeTool();
        }
    };

    switchLanguage('en');
</script>
